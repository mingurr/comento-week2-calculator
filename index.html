<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://kit.fontawesome.com/1a290abd05.js"
      crossorigin="anonymous"
    ></script>
    <title>Calculator UI</title>
  </head>
  <body>
    <main>
      <form class="calculator">
        <input class="calculator__screen" placeholder="" />

        <div class="calculator__keypad">
          <button class="keypad__button keypad__button--function">
            <i class="fa-solid fa-delete-left"></i>
          </button>
          <button class="keypad__button keypad__button--function">
            <i class="fa-solid fa-c"></i>
          </button>
          <button class="keypad__button keypad__button--function">
            <i class="fa-solid fa-percent"></i>
          </button>
          <button class="keypad__button keypad__button--operator">
            <i class="fa-solid fa-divide"></i>
          </button>
          <button class="keypad__button keypad__button--number">7</button>
          <button class="keypad__button keypad__button--number">8</button>
          <button class="keypad__button keypad__button--number">9</button>
          <button class="keypad__button keypad__button--operator">
            <i class="fa-solid fa-xmark"></i>
          </button>
          <button class="keypad__button keypad__button--number">4</button>
          <button class="keypad__button keypad__button--number">5</button>
          <button class="keypad__button keypad__button--number">6</button>
          <button class="keypad__button keypad__button--operator">
            <i class="fa-solid fa-minus"></i>
          </button>
          <button class="keypad__button keypad__button--number">1</button>
          <button class="keypad__button keypad__button--number">2</button>
          <button class="keypad__button keypad__button--number">3</button>
          <button class="keypad__button keypad__button--operator">
            <i class="fa-solid fa-plus"></i>
          </button>
          <button class="keypad__button keypad__button--number"></button>
          <button class="keypad__button keypad__button--number">0</button>
          <button class="keypad__button keypad__button--number">.</button>
          <button class="keypad__button keypad__button--operator">
            <i class="fa-solid fa-equals"></i>
          </button>
        </div>
      </form>
    </main>
  </body>
</html>
